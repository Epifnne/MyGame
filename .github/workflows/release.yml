name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Init required submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1 ThirdParty/glfw ThirdParty/glad ThirdParty/glm ThirdParty/imgui ThirdParty/stb

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxi-dev libxcursor-dev libglu1-mesa-dev zip

      - name: Install Python deps for glad
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install jinja2

      - name: Configure
        shell: bash
        run: cmake -S . -B Build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DPython_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')" -DPython3_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')"

      - name: Build
        shell: bash
        run: |
          if grep -q '^CMAKE_CONFIGURATION_TYPES:' Build/CMakeCache.txt; then
            echo "Multi-config generator detected, building Release config"
            cmake --build Build --config Release --parallel
          else
            echo "Single-config generator detected, building active config"
            cmake --build Build --parallel
          fi

      - name: Run tests
        shell: bash
        run: |
          if grep -q '^CMAKE_CONFIGURATION_TYPES:' Build/CMakeCache.txt; then
            ctest --test-dir Build --output-on-failure -C Release
          else
            ctest --test-dir Build --output-on-failure
          fi

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist
          if [ ! -d "MyGame" ]; then
            echo "MyGame output directory not found"
            find Build -maxdepth 3 -type d || true
            exit 1
          fi
          (cd MyGame && zip -r "../dist/MyGame-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}-linux.zip" .)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: mygame-linux
          path: dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Init required submodules
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1 ThirdParty/glfw ThirdParty/glad ThirdParty/glm ThirdParty/imgui ThirdParty/stb

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps for glad
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install jinja2

      - name: Configure
        shell: pwsh
        run: |
          $py = python -c "import sys; print(sys.executable)"
          $outRoot = Join-Path (Get-Location) 'MyGame'
          $outLib = Join-Path $outRoot 'lib'
          cmake -S . -B Build -DBUILD_TESTING=ON -DPython_EXECUTABLE="$py" -DPython3_EXECUTABLE="$py" -DCMAKE_RUNTIME_OUTPUT_DIRECTORY="$outRoot" -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE="$outRoot" -DCMAKE_LIBRARY_OUTPUT_DIRECTORY="$outLib" -DCMAKE_LIBRARY_OUTPUT_DIRECTORY_RELEASE="$outLib" -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY="$outLib" -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY_RELEASE="$outLib"

      - name: Build
        shell: pwsh
        run: |
          $isMultiConfig = Select-String -Path Build/CMakeCache.txt -Pattern '^CMAKE_CONFIGURATION_TYPES:' -Quiet
          if ($isMultiConfig) {
            Write-Host 'Multi-config generator detected, building Release config'
            cmake --build Build --config Release --parallel
          } else {
            Write-Host 'Single-config generator detected, building active config'
            cmake --build Build --parallel
          }

      - name: Run tests
        shell: pwsh
        run: |
          $isMultiConfig = Select-String -Path Build/CMakeCache.txt -Pattern '^CMAKE_CONFIGURATION_TYPES:' -Quiet
          if ($isMultiConfig) {
            ctest --test-dir Build --output-on-failure -C Release
          } else {
            ctest --test-dir Build --output-on-failure
          }

      - name: Package binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.tag }}' } else { '${{ github.ref_name }}' }
          if (-not (Test-Path "MyGame")) {
            Write-Host 'MyGame output directory not found.'
            if (Test-Path Build) {
              Get-ChildItem -Path Build -Directory -Recurse | Select-Object -First 80 | ForEach-Object { $_.FullName }
            }
            throw 'Packaging failed: MyGame output directory not found.'
          }
          if (-not (Test-Path "MyGame/MyGame.exe")) {
            throw 'Packaging failed: MyGame/MyGame.exe not found. Check Configure output directory flags.'
          }

          Compress-Archive -Path "MyGame" -DestinationPath "dist/MyGame-$tag-windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mygame-windows
          path: dist/*.zip

  release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist-all/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
